# SPARC-P Backend Environment for PubApps (single L4 GPU, 24 GB VRAM)
#
# This env supports the FastAPI backend (`v2/main.py`), the Llama 3.1 8B
# Instruct base + LoRA adapters, Chroma RAG, NeMo Guardrails, NVIDIA Riva
# (ASR/TTS), and Firebase session state.
#
# Pins are aligned with the training env (`sparc_training_clean` on
# HiPerGator) so the LoRA adapter_config.json files written by PEFT 0.18.1
# load cleanly on PubApp. Chroma/SentenceTransformers are pinned to the
# versions that were used to *build* the existing on-disk Chroma index
# (`trained_models/vector_db/sparc_training_markdown_kb/`) so we can rsync
# it to PubApp without a rebuild.
#
# Create on the PubApp VM:
#   module load conda   # or source your conda setup
#   conda env create -f environment_backend.yml -p /pubapps/SPARCP/conda_envs/sparc_backend
#   conda activate /pubapps/SPARCP/conda_envs/sparc_backend
#
# The pinned CUDA wheels (torch==2.5.1+cu121) match the stock L4 driver
# stack on PubApp VMs. If your PubApp VM already ships a newer driver
# (CUDA 12.4+), bump to `torch==2.6.*+cu124` — adapter load is unaffected.

name: sparc_backend
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - git

  # System-level libs that pip wheels do not ship
  - libstdcxx-ng>=12
  - ca-certificates
  # Kokoro TTS phonemizer (SPARC_TTS_BACKEND=kokoro); install via conda on PubApp if apt is unavailable
  - espeak-ng

  # FastAPI process dependencies available on conda-forge
  - fastapi
  - uvicorn
  # Keep exact bounds string expected by H1b dependency guard cell.
  - pydantic>=2.5.0,<3.0.0
  - python-multipart
  - aiofiles
  - aiohttp
  - websockets
  - numpy>=1.26,<2.0
  - pandas
  - matplotlib

  - pip:
      # ---- PyTorch (match training CUDA ABI for adapter load) ---------------
      # L4 (CC 8.9) runs cleanly on cu121 wheels. If your PubApp VM has a
      # CUDA 12.4 driver, swap these three lines to the `+cu124` variants.
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.5.1+cu121
      - torchvision==0.20.1+cu121

      # ---- HuggingFace / PEFT (MUST match the training-time versions) ------
      # Training env (`sparc_training_clean`) wrote adapter_config.json
      # files with peft==0.18.1 + transformers==5.5.0; loading with older
      # peft silently drops newer LoRA fields and produces degraded output.
      - transformers==5.5.0
      - tokenizers>=0.21,<0.22
      - accelerate==1.13.0
      - peft==0.18.1
      - safetensors>=0.4.3

      # ---- 4-bit quantization (required to fit 8B on a 24 GB L4) -----------
      - bitsandbytes==0.49.2

      # ---- RAG runtime (must match the index on disk) ----------------------
      # The existing Chroma index at
      # `/blue/jasondeanarnold/SPARCP/trained_models/vector_db/sparc_training_markdown_kb/`
      # was written by chromadb 0.5.x with HNSW. Chroma 1.x (Rust backend)
      # CANNOT read that format — pin to the 0.5 line and rsync the index
      # verbatim to `/pubapps/SPARCP/rag/chroma/`.
      - chromadb==0.5.20
      # SentenceTransformers is pinned to the same version used when the
      # index was built so query vectors live in the same embedding space.
      - sentence-transformers==2.7.0
      - huggingface-hub>=0.23,<1.0

      # ---- NeMo Guardrails (SPARC safety layer) ----------------------------
      # 0.21.x is the newest release that still works with langchain<0.3.
      # Guardrails config lives at $SPARC_GUARDRAILS_DIR (see deploy bundle).
      - nemoguardrails==0.21.0
      # Keep exact lower-bounds strings expected by H1b dependency guard cell.
      - langchain>=0.2.0,<0.3.0
      - langchain-community>=0.2.0,<0.3.0
      - langchain-text-splitters>=0.2.0,<0.3.0
      - langchain-core>=0.2.38,<0.3.0

      # ---- Kokoro TTS (local; set SPARC_TTS_BACKEND=kokoro + HF_HOME on PubApp) -
      - kokoro>=0.9.4
      - soundfile

      # ---- NVIDIA Riva client (ASR + TTS gRPC) -----------------------------
      # Optional if TTS uses Kokoro and Unity handles ASR (Recognissimo).
      # Matches the 2.16 quickstart container shipped in v2/containers/.
      - nvidia-riva-client==2.25.1
      - grpcio>=1.60,<2.0
      - grpcio-tools>=1.60,<2.0

      # ---- Firebase session store ------------------------------------------
      - firebase-admin>=6.5,<7.0

      # ---- Misc runtime ----------------------------------------------------
      - python-dotenv>=1.0,<2.0
      - python-jose[cryptography]>=3.3,<4.0
      - httpx>=0.27,<0.29
